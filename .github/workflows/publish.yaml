name: Publish to crates.io
on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for toml in scrutiny-derive/Cargo.toml scrutiny/Cargo.toml scrutiny-axum/Cargo.toml; do
            sed -i "s/^version = .*/version = \"${VERSION}\"/" "$toml"
          done
          # Update path dependencies to use the new version
          sed -i "s|scrutiny-derive = { path = \"../scrutiny-derive\" }|scrutiny-derive = { path = \"../scrutiny-derive\", version = \"${VERSION}\" }|" scrutiny/Cargo.toml
          sed -i "s|scrutiny = { path = \"../scrutiny\".*}|scrutiny = { path = \"../scrutiny\", version = \"${VERSION}\", features = [\"serde\", \"serde_json\", \"serde_path_to_error\"] }|" scrutiny-axum/Cargo.toml

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish scrutiny-derive
        run: cargo publish -p scrutiny-derive --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish scrutiny
        run: cargo publish -p scrutiny --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish scrutiny-axum
        run: cargo publish -p scrutiny-axum --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
